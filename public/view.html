<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CharmSync Memory</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --rose-gold: #E8B4A8;
      --deep-rose: #C89FA5;
      --lavender: #B4A8E8;
      --cream: #FAF8F3;
      --charcoal: #2A2A2A;
      --soft-shadow: 0 8px 30px rgba(200, 159, 165, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: linear-gradient(135deg, var(--cream) 0%, #FFF5F0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--charcoal);
      position: relative;
      overflow: hidden;
    }

    /* Animated background */
    .bg-decoration {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232, 180, 168, 0.15), transparent);
      animation: float 20s infinite ease-in-out;
    }

    .circle:nth-child(1) {
      width: 400px;
      height: 400px;
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .circle:nth-child(2) {
      width: 300px;
      height: 300px;
      bottom: -80px;
      right: -80px;
      animation-delay: 7s;
    }

    .circle:nth-child(3) {
      width: 250px;
      height: 250px;
      top: 50%;
      left: 50%;
      animation-delay: 14s;
    }

    @keyframes float {
      0%, 100% {
        transform: translate(0, 0) scale(1);
        opacity: 0.3;
      }
      50% {
        transform: translate(50px, -50px) scale(1.1);
        opacity: 0.5;
      }
    }

    /* Message container */
    .message-container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      width: 100%;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 60px 50px;
      box-shadow: var(--soft-shadow);
      text-align: center;
      animation: slideIn 0.6s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Logo */
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--rose-gold), var(--lavender));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 40px;
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* Status icons */
    .status-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      animation: pulse 2s infinite ease-in-out;
    }

    .status-icon.unlocked {
      background: linear-gradient(135deg, var(--rose-gold), var(--deep-rose));
      box-shadow: 0 8px 30px rgba(232, 180, 168, 0.4);
    }

    .status-icon.locked {
      background: linear-gradient(135deg, #A8A8A8, #808080);
      box-shadow: 0 8px 30px rgba(128, 128, 128, 0.3);
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    /* Message text */
    .message-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--charcoal);
      margin-bottom: 20px;
    }

    .message-text {
      font-size: 18px;
      line-height: 1.8;
      color: var(--charcoal);
      margin-bottom: 30px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 16px;
      border: 2px solid rgba(232, 180, 168, 0.2);
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message-text.locked-msg {
      color: var(--deep-rose);
      font-weight: 500;
      font-style: italic;
    }

    /* Countdown timer */
    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-top: 30px;
    }

    .countdown-item {
      padding: 15px;
      background: rgba(232, 180, 168, 0.1);
      border-radius: 12px;
      border: 2px solid rgba(232, 180, 168, 0.3);
    }

    .countdown-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--deep-rose);
      display: block;
    }

    .countdown-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--charcoal);
      margin-top: 5px;
      display: block;
      opacity: 0.7;
    }

    /* Loading state */
    .loading {
      text-align: center;
      color: var(--deep-rose);
      font-size: 18px;
      font-weight: 500;
    }

    .spinner {
      width: 50px;
      height: 50px;
      margin: 0 auto 20px;
      border: 4px solid rgba(232, 180, 168, 0.2);
      border-top-color: var(--rose-gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error state */
    .error-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .error-text {
      color: #D64545;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .error-details {
      color: var(--deep-rose);
      font-size: 14px;
      opacity: 0.8;
    }

    /* Footer */
    .footer {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 2px solid rgba(232, 180, 168, 0.2);
      font-size: 13px;
      color: var(--deep-rose);
      opacity: 0.7;
    }

    @media (max-width: 768px) {
      .message-container {
        padding: 40px 30px;
      }

      .message-text {
        font-size: 16px;
        padding: 20px;
      }

      .countdown {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBgO6Tig6uWBdrEGFuCRcS45SC5rQ5nEyI",
      authDomain: "charmsync.firebaseapp.com",
      projectId: "charmsync",
      storageBucket: "charmsync.firebasestorage.app",
      messagingSenderId: "109688788362",
      appId: "1:109688788362:web:21f4e2e5b379613fbca473",
      measurementId: "G-NCMVBS4Q08"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function getQueryParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    function updateCountdown(unlockDate) {
      const now = new Date();
      const diff = unlockDate - now;

      if (diff <= 0) {
        location.reload(); // Reload when time is up
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = days.toString().padStart(2, '0');
      document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
      document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
      document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
    }

    async function showMessage() {
      const container = document.getElementById("content");
      const id = getQueryParam("id");

      if (!id) {
        container.innerHTML = `
          <div class="error-icon">⚠️</div>
          <div class="error-text">Invalid QR Code</div>
          <div class="error-details">This link doesn't contain a valid message ID.</div>
        `;
        return;
      }

      try {
        const docRef = doc(db, "qrMessages", id);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
          container.innerHTML = `
            <div class="error-icon">🔍</div>
            <div class="error-text">Message Not Found</div>
            <div class="error-details">This message may have been deleted or the link is incorrect.</div>
          `;
          return;
        }

        const data = docSnap.data();
        const now = new Date();

        // Check if this is an instant message (no unlockAt field) or a time-locked message
        const isInstantMessage = !data.unlockAt;
        
        if (isInstantMessage) {
          // Show instant message
          container.innerHTML = `
            <div class="status-icon unlocked">✨</div>
            <div class="message-title">A Memory Just For You</div>
            <div class="message-text">${escapeHtml(data.text)}</div>
            <div class="footer">Created with CharmSync 💫</div>
          `;
        } else {
          // Time-locked message
          const unlockDate = data.unlockAt.toDate();

          if (now >= unlockDate) {
            // Message is unlocked
            container.innerHTML = `
              <div class="status-icon unlocked">🎁</div>
              <div class="message-title">Your Memory Has Been Unlocked!</div>
              <div class="message-text">${escapeHtml(data.text)}</div>
              <div class="footer">Unlocked on ${unlockDate.toLocaleDateString()} • CharmSync 💫</div>
            `;
          } else {
            // Message is still locked
            container.innerHTML = `
              <div class="status-icon locked">🔒</div>
              <div class="message-title">This Memory is Time-Locked</div>
              <div class="message-text locked-msg">
                This special message will be revealed on<br>
                <strong>${unlockDate.toLocaleDateString()} at ${unlockDate.toLocaleTimeString()}</strong>
              </div>
              <div class="countdown">
                <div class="countdown-item">
                  <span class="countdown-value" id="days">00</span>
                  <span class="countdown-label">Days</span>
                </div>
                <div class="countdown-item">
                  <span class="countdown-value" id="hours">00</span>
                  <span class="countdown-label">Hours</span>
                </div>
                <div class="countdown-item">
                  <span class="countdown-value" id="minutes">00</span>
                  <span class="countdown-label">Minutes</span>
                </div>
                <div class="countdown-item">
                  <span class="countdown-value" id="seconds">00</span>
                  <span class="countdown-label">Seconds</span>
                </div>
              </div>
              <div class="footer">Check back soon! • CharmSync 💫</div>
            `;

            // Start countdown
            updateCountdown(unlockDate);
            setInterval(() => updateCountdown(unlockDate), 1000);
          }
        }
      } catch (error) {
        console.error("Error fetching message:", error);
        container.innerHTML = `
          <div class="error-icon">❌</div>
          <div class="error-text">Connection Error</div>
          <div class="error-details">Unable to load the message. Please check your internet connection.</div>
        `;
      }
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.addEventListener("DOMContentLoaded", showMessage);
  </script>
</head>
<body>
  <div class="bg-decoration">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <div class="message-container">
    <div class="logo">CharmSync</div>
    
    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        Loading your memory...
      </div>
    </div>
  </div>
</body>
</html>
